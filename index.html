<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뚜밍 · dduming</title>
<meta name="description" content="기술 · 경제 · 부동산 브리핑 블로그. 준비 중입니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --ink:#18181b; --sub:#6b6b70; --point:#3b6ef5; --bg:#faf9f6; --line:rgba(24,24,27,.12); }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'IBM Plex Sans KR', system-ui, sans-serif;
    background: color-mix(in srgb, var(--point) 4%, var(--bg));
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  main { max-width: 520px; text-align: center; }
  .logo { font-weight: 700; font-size: 44px; letter-spacing: -.02em; }
  .logo .dot { color: var(--point); }
  .en { color: var(--sub); font-size: 15px; letter-spacing: .04em; margin-top: 6px; }
  .rule { height: 1px; background: var(--line); margin: 28px auto; width: 64px; }
  h1 { font-size: 21px; font-weight: 600; margin: 0 0 12px; }
  p { color: var(--sub); font-size: 15.5px; line-height: 1.8; margin: 0; }
  .tags { margin-top: 26px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .tag {
    font-size: 12.5px; font-weight: 500; padding: 5px 12px; border-radius: 999px;
    background: color-mix(in srgb, var(--point) 10%, transparent);
    color: color-mix(in srgb, var(--point) 80%, var(--ink));
  }
  footer { margin-top: 40px; color: var(--sub); font-size: 12.5px; }
</style>
</head>
<body>
<main>
  <div class="logo">뚜밍<span class="dot">.</span></div>
  <div class="en">dduming</div>
  <div class="rule"></div>
  <h1>곧 찾아옵니다</h1>
  <p>기술 · 경제 · 부동산을 짧고 정확하게.<br>지금 페이지를 준비하고 있어요.</p>
  <div class="tags">
    <span class="tag">기술</span>
    <span class="tag">경제</span>
    <span class="tag">부동산</span>
  </div>
  <footer>© 2026 dduming</footer>
</main>
</body>
</html>
